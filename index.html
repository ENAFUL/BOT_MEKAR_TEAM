<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS IN A FULL | ADMIN CONTROL</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Courier New', monospace; 
            background: url('https://i.supaimg.com/d8919cc0-dc9c-41e0-9c14-2ff75835e603/07dfc9d2-a92b-4c7d-b905-654b53202c1e.png') no-repeat center center fixed;
            background-size: cover; color: #00ff00; display: flex; justify-content: center; align-items: center; }
        .main-box { background: rgba(0, 0, 0, 0.9); padding: 30px; border: 2px solid #00ff00; 
            width: 320px; text-align: center; border-radius: 15px; box-shadow: 0 0 20px #00ff00; }
        input { display: block; margin: 10px auto; padding: 10px; background: transparent; 
            border: 1px solid #00ff00; color: white; width: 85%; }
        button { background: #00ff00; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #adminPanel { display: none; margin-top: 20px; border-top: 1px solid #00ff00; pt: 10px; }
    </style>
</head>
<body>

<div class="main-box" id="loginBox">
    <h1>BOSS IN A FULL</h1>
    <form id="authForm">
        <input type="email" id="email" placeholder="GMAIL" required>
        <input type="password" id="password" placeholder="PASSWORD" required>
        <button type="submit">ACCESS SYSTEM</button>
    </form>
</div>

<div class="main-box" id="adminPanel">
    <h3>ADMIN DASHBOARD</h3>
    <p>Total Users Visited: <span id="userCount">0</span></p>
    <p>System Status: <span style="color: #00ff00;">ONLINE</span></p>
    <button onclick="location.reload()">REFRESH SYSTEM</button>
</div>

<script>
    // ইউজার কাউন্টার লজিক
    let count = localStorage.getItem('visitorCount') || 0;
    count++;
    localStorage.setItem('visitorCount', count);
    document.getElementById('userCount').innerText = count;

    document.getElementById('authForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;
        
        // যদি ইমেইল 'admin@boss.com' হয় তবে ড্যাশবোর্ড খুলবে
        if(email === "admin@boss.com") {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
        } else {
            alert("ACCESS DENIED: NOT AN ADMIN");
        }
    });
</script>

</body>
</html>
